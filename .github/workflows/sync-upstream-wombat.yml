name: Sync upstream WOMBAT sources

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Checkout upstream generic-tracers
        uses: actions/checkout@v4
        with:
          repository: ACCESS-NRI/GFDL-generic-tracers
          ref: main
          path: upstream-generic-tracers
      - name: Sync Fortran sources from upstream checkout
        run: python scripts/sync_wombat_sources.py --upstream-dir upstream-generic-tracers
      - name: Run WOMBAT-lite alignment sanity check
        run: python scripts/check_wombat_lite_alignment.py womcol/upstream/generic_WOMBATlite.F90 --strict
      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/sync-upstream-wombat
          title: "chore: sync upstream WOMBAT Fortran sources"
          commit-message: "chore: sync upstream WOMBAT Fortran sources"
          body: |
            Automated sync from ACCESS-NRI/GFDL-generic-tracers main branch.
            Updated files:
            - womcol/upstream/generic_WOMBATlite.F90
            - womcol/upstream/generic_WOMBATmid.F90
            - womcol/upstream/metadata.json
