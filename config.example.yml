year: 2019
latitude: -42.0
longitude: 147.0
days: 365
column:
  depth_m: 200
  nz: 80
  dt_seconds: 1800
data:
  jra55_uri: ./example_data/jra55_point.nc
  init_uri: ./example_data/init_profiles.nc
model:
